<svg xmlns="http://www.w3.org/2000/svg" width="400" height="100" viewBox="0 0 400 100" preserveAspectRatio="none">
  <rect width="400" height="100" fill="transparent"/>
  <!-- Beams stretch horizontally across the entire 100x100 box -->
  <!-- Frame 1 -->
  <rect x="0" y="45" width="100" height="10" fill="#f00" opacity="0.5"/>
  <!-- Frame 2 -->
  <rect x="100" y="40" width="100" height="20" fill="#ff0" opacity="0.7"/>
  <rect x="100" y="45" width="100" height="10" fill="#fff" opacity="1"/>
  <!-- Frame 3 -->
  <rect x="200" y="30" width="100" height="40" fill="#ff0" opacity="0.9"/>
  <rect x="200" y="40" width="100" height="20" fill="#fff" opacity="1"/>
  <!-- Frame 4 -->
  <rect x="300" y="45" width="100" height="10" fill="#f00" opacity="0.5"/>
</svg>
